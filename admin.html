<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - ANGEL 授权中心</title>
<meta name="description" content="ANGEL 授权管理后台">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#1a1a2e">
<link rel="stylesheet" href="css/style.css">
<!-- 覆盖旧CSS：超亮 + 泛光 -->
<style>
body { background: linear-gradient(135deg,#1a0a3e 0%,#2d1b69 40%,#4a2d8f 70%,#1a0a3e 100%) !important; filter: none !important; }
#bgOverlay, #bgPreloader { display: none !important; }
#bgVideo { display: none !important; }
body::before {
    content:'' !important;
    position:fixed !important;
    inset:0 !important;
    z-index:-1 !important;
    background:
        radial-gradient(ellipse at 50% 0%,   rgba(255,240,255,.15) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(130,100,220,.12) 0%, transparent 55%) !important;
}
body::after {
    content:'' !important;
    position:fixed !important;
    inset:0 !important;
    z-index:-2 !important;
    background: radial-gradient(ellipse at 50% 50%, rgba(180,150,255,.15) 0%, transparent 70%) !important;
    pointer-events:none !important;
}
.card { background: rgba(90,90,140,.78) !important; backdrop-filter: blur(16px) brightness(1.3) !important; border: 1px solid rgba(200,190,255,.18) !important; box-shadow: 0 0 20px rgba(130,110,220,.15), 0 8px 32px rgba(0,0,0,.3) !important; }
.navbar { background: rgba(74,74,138,.78) !important; backdrop-filter: blur(16px) brightness(1.3) !important; }
</style>
</head>
<body>

<nav class="navbar"><a href="index.html" class="navbar-brand"><span class="angel-icon"></span> ANGEL<span class="admin-badge">ADMIN</span></a><div style="display:flex;gap:10px;align-items:center;"><a href="index.html" class="btn btn-outline btn-sm">🏠 首页</a><a href="auth.html" class="btn btn-primary btn-sm">🔐 授权</a><span id="adminInfo" style="color:var(--accent-light);font-size:12px;display:none;"></span><button id="logoutBtn" style="background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.3);color:var(--danger);font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;" onclick="sessionStorage.removeItem('angel_session');location.reload();">退出</button></div></nav>

<!-- 登录 -->
<div id="loginPanel" style="padding-top:60px;max-width:460px;margin:0 auto;">
<div id="step1" class="card">
<div class="card-title">🔐 安全登录 · 第一步</div>
<input type="text" class="form-input" id="uname" placeholder="用户名" style="margin-bottom:10px;">
<input type="password" class="form-input" id="upass" placeholder="密码" style="margin-bottom:10px;">
<p style="font-size:11px;color:var(--accent-light);margin-bottom:14px;">🔒 失败5次锁IP · 需安全密钥双重验证</p>
<button id="btnStep1" style="width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;" onclick="
var u=document.getElementById('uname').value.trim(),p=document.getElementById('upass').value.trim(),er=document.getElementById('errMsg');
er.style.display='none';
var _ux=[11,4,13,15,6],_px=[127,120,122,123,121,123,126,61,43,36,45],_x=0x4A;
var _uDec=String.fromCharCode.apply(null,_ux.map(function(b){return b^_x;}));
var _pDec=String.fromCharCode.apply(null,_px.map(function(b){return b^_x;}));
if(u!==_uDec||p!==_pDec){er.textContent=' 用户名或密码错误';er.style.display='block';return;}
document.getElementById('step1').style.display='none';
document.getElementById('step2').style.display='';
alert('✅ 身份验证通过！请输入安全密钥。');
">🔓 验证身份</button>
<p id="errMsg" style="color:var(--danger);font-size:13px;text-align:center;margin-top:12px;display:none;"></p>
</div>

<div id="step2" class="card" style="display:none;">
<div class="card-title">🔑 二次验证 · 安全密钥</div>
<p style="text-align:center;color:var(--text-secondary);font-size:13px;">请输入管理员安全密钥</p>
<input type="password" class="form-input" id="vcode" placeholder="输入安全密钥" style="margin-bottom:10px;">
<button id="btnStep2" style="width:100%;padding:12px;background:var(--success);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;" onclick="
var c=document.getElementById('vcode').value.trim(),er=document.getElementById('err2');
er.style.display='none';
if(!c){er.textContent=' 请输入安全密钥';er.style.display='block';return;}
var _k=[123,121,127,126,123,121,125,121,122,125,10,59,59,100,41,37,39],_x=0x4A;
var _dec=String.fromCharCode.apply(null,_k.map(function(b){return b^_x;}));
var sk=localStorage.getItem('angel_security_key')||_dec;
if(c!==sk){er.textContent=' 密钥错误';er.style.display='block';return;}
sessionStorage.setItem('angel_session',JSON.stringify({token:'ok-'+Date.now(),user:'ANGEL',t:Date.now()}));
document.getElementById('loginPanel').style.display='none';
document.getElementById('adminPanel').style.display='';
document.getElementById('adminInfo').textContent=' ANGEL';
document.getElementById('okBanner').style.display='';
alert(' 登录成功！');
if(typeof window.loadDataFn==='function')window.loadDataFn();
">✅ 验证并登录</button>
<p id="err2" style="color:var(--danger);font-size:13px;text-align:center;margin-top:12px;display:none;"></p>
<button id="btnBack" style="display:block;width:100%;margin-top:12px;padding:8px;background:transparent;border:1px solid var(--glass-border);color:var(--text-secondary);border-radius:6px;cursor:pointer;font-size:13px;" onclick="document.getElementById('step2').style.display='none';document.getElementById('step1').style.display='';">← 返回</button>
</div>
</div>

<!-- 管理面板 -->
<div id="adminPanel" style="display:none;"><div class="container">
<div id="okBanner" style="padding:14px;background:rgba(0,210,211,.1);border:1px solid rgba(0,210,211,.25);border-radius:12px;text-align:center;margin-bottom:20px;color:var(--success);font-weight:500;">✅ 双重验证通过 · 会话已加密保护</div>

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">
<div class="stat-card"><div class="stat-num" style="color:var(--warning);" id="sP">0</div><div class="stat-label">待审批</div></div>
<div class="stat-card"><div class="stat-num" style="color:var(--success);" id="sA">0</div><div class="stat-label">已通过</div></div>
<div class="stat-card"><div class="stat-num" style="color:var(--danger);" id="sR">0</div><div class="stat-label">已拒绝</div></div>
<div class="stat-card"><div class="stat-num" style="color:var(--accent-light);" id="sT">0</div><div class="stat-label">今日申请</div></div>
</div>

<div style="display:flex;gap:4px;margin-bottom:16px;background:rgba(255,255,255,.04);padding:4px;border-radius:8px;">
<button id="tabPen" style="flex:1;padding:10px;border:none;background:var(--accent);color:#fff;border-radius:6px;cursor:pointer;font-size:13px;" onclick="showTab('pen')">⏳ 待审批 (<span id="cP">0</span>)</button>
<button id="tabAll" style="flex:1;padding:10px;border:none;background:transparent;color:var(--text-secondary);border-radius:6px;cursor:pointer;font-size:13px;" onclick="showTab('all')">📋 全部记录</button>
<button id="tabAuth" style="flex:1;padding:10px;border:none;background:transparent;color:var(--text-secondary);border-radius:6px;cursor:pointer;font-size:13px;" onclick="showTab('auth')">🔑 授权管理</button>
</div>

<div id="panelPen">
<div id="pList"></div>
<div id="pEmpty" style="text-align:center;padding:40px;color:var(--text-muted);display:none;"><div style="font-size:40px;">✅</div><p style="margin-top:8px;">暂无待审批申请</p></div>
</div>

<div id="panelAll" style="display:none;">
<div style="display:flex;gap:8px;margin-bottom:12px;">
<input type="text" class="form-input" id="searchInput" placeholder="搜索卡密..." style="flex:1;" oninput="doFilter()">
<select id="filterSt" onchange="doFilter()" style="padding:8px 12px;background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--text-primary);border-radius:6px;font-size:13px;"><option value="">全部状态</option><option value="pending">待审批</option><option value="approved">已通过</option><option value="rejected">已拒绝</option></select>
</div>
<div id="aList"></div>
<div id="aEmpty" style="text-align:center;padding:40px;color:var(--text-muted);display:none;"><div style="font-size:40px;">📭</div><p style="margin-top:8px;">暂无记录</p></div>
</div>

<div id="panelAuth" style="display:none;">
<div class="card" style="margin-bottom:16px;">
<div class="card-title">🔑 授权管理中心</div>
<p style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">查看所有用户授权申请，手动审批并发送授权码。</p>
<div id="authList"></div>
<div id="authEmpty" style="text-align:center;padding:40px;color:var(--text-muted);"><div style="font-size:40px;">📭</div><p style="margin-top:8px;">暂无授权申请</p></div>
</div>
</div>

</div></div>

<div id="rejModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;align-items:center;justify-content:center;">
<div style="background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:12px;padding:24px;width:400px;max-width:90%;">
<h3 style="margin-bottom:12px;">❌ 拒绝申请</h3>
<textarea id="rejReason" rows="3" placeholder="请输入拒绝原因..." style="width:100%;padding:10px;background:rgba(255,255,255,.05);border:1px solid var(--glass-border);border-radius:6px;color:var(--text-primary);resize:none;margin-bottom:12px;"></textarea>
<div style="display:flex;gap:8px;justify-content:flex-end;">
<button onclick="document.getElementById('rejModal').style.display='none'" style="padding:8px 16px;background:transparent;border:1px solid var(--glass-border);color:var(--text-secondary);border-radius:6px;cursor:pointer;">取消</button>
<button onclick="doReject()" style="padding:8px 16px;background:var(--danger);color:#fff;border:none;border-radius:6px;cursor:pointer;">确认拒绝</button>
</div>
</div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
var WORKER_URL="https://angelapiproxy.1354137307.workers.dev";
(function(){
  var _devDect=setInterval(function(){
    var th=window.outerHeight-window.innerHeight>160,tw=window.outerWidth-window.innerWidth>160;
    var t0=performance.now();console.log('%c','font-size:0');
    if(th||tw||(performance.now()-t0)>80){
      console.clear();
      document.body.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#e74c3c;font-size:20px;font-weight:700;gap:14px;background:#1a1a2e;"><span style="font-size:54px;"> </span>异常环境<small style="font-size:13px;color:#888;font-weight:400;">关闭开发者工具后刷新页面</small></div>';
    }
  },800);
  setInterval(function(){console.log(' 安全告警 '+Math.random().toString(36).slice(2,12),'color:#e74c3c');},55000);
  document.addEventListener('contextmenu',function(e){e.preventDefault();});
  document.addEventListener('keydown',function(e){
    if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))||(e.ctrlKey&&e.key==='U')){e.preventDefault();}
  });
})();

(function(){
var failCount=0,MAX_FAIL=5,LOCK_MS=900000,t0=0,rejId=null;
window.toastFn=function(m){var c=document.getElementById('toastContainer');if(!c)return;var d=document.createElement('div');d.className='toast toast-info';d.textContent=m;c.appendChild(d);setTimeout(function(){d.style.opacity='0';setTimeout(function(){d.remove()},300)},3000)};
window.toast=window.toastFn;

function showTab(t){
document.getElementById('tabPen').style.background=t==='pen'?'var(--accent)':'transparent';
document.getElementById('tabPen').style.color=t==='pen'?'#fff':'var(--text-secondary)';
document.getElementById('tabAll').style.background=t==='all'?'var(--accent)':'transparent';
document.getElementById('tabAll').style.color=t==='all'?'#fff':'var(--text-secondary)';
document.getElementById('tabAuth').style.background=t==='auth'?'var(--accent)':'transparent';
document.getElementById('tabAuth').style.color=t==='auth'?'#fff':'var(--text-secondary)';
document.getElementById('panelPen').style.display=t==='pen'?'block':'none';
document.getElementById('panelAll').style.display=t==='all'?'block':'none';
document.getElementById('panelAuth').style.display=t==='auth'?'block':'none';
}
window.showTab=showTab;

var data=[
{id:'1',ck:'ANGEL-2024-001',uid:'test_user_001',st:'pending',time:new Date(Date.now()-3600000).toISOString(),tok:'',rej:''},
{id:'2',ck:'ANGEL-2024-002',uid:'test_user_002',st:'approved',time:new Date(Date.now()-7200000).toISOString(),tok:'hysafe_xK9mP2qR',rej:''},
];

async function loadDataFn(){
  var pen=document.getElementById('pList'),all=document.getElementById('aList');
  pen.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-muted);"> 加载中...</div>';
  all.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-muted);"> 加载中...</div>';
  try {
    const res = await fetch(WORKER_URL+'/proxy/api/admin/applications');
    const j = await res.json();
    window.data=j.data||[];
    renderPen();renderAll();
    document.getElementById('cP').textContent=j.pending||0;
  } catch(err) {
    pen.innerHTML='<div style="padding:20px;text-align:center;color:var(--danger);"> 加载失败：'+err.message+'</div>';
    all.innerHTML='<div style="padding:20px;text-align:center;color:var(--danger);"> 加载失败：'+err.message+'</div>';
  }
}

function renderPen(){}
function renderAll(){}
function doFilter(){}

window.loadDataFn=loadDataFn;
})();
</script>
</body>
</html>
