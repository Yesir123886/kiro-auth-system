<div id="loginPanel" style="padding-top:60px;max-width:460px;margin:0 auto;">
<div id="step1" class="card">

<button id="btnStep1" style="width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;" onclick="
var u=document.getElementById('uname').value.trim(),p=document.getElementById('upass').value.trim(),er=document.getElementById('errMsg');
er.style.display='none';
// 凭证混淆验证（非明文存储）
var _uQV='QU5HRUw=',_pQV='NTIwMTMxNHdhbg==';
if(u!==atob(_uQV)||p!==atob(_pQV)){er.textContent='❌ 用户名或密码错误';er.style.display='block';return;}
document.getElementById('step1').style.display='none';
document.getElementById('step2').style.display='';
alert('✅ 身份验证通过！请输入安全密钥。');

</div>

<button id="btnStep2" style="width:100%;padding:12px;background:var(--success);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;" onclick="
var c=document.getElementById('vcode').value.trim(),er=document.getElementById('err2');
er.style.display='none';
if(!c){er.textContent='请输入安全密钥';er.style.display='block';return;}
var _skD='MTM1NDEzNzMwN0BxcS5jb20=';
var sk=localStorage.getItem('angel_security_key')||atob(_skD);
if(c!==sk){er.textContent='❌ 密钥错误';er.style.display='block';return;}
sessionStorage.setItem('angel_session',JSON.stringify({token:'ok-'+Date.now(),user:'ANGEL',t:Date.now()}));
document.getElementById('loginPanel').style.display='none';
document.getElementById('adminPanel').style.display='';

alert('🎉 登录成功！');
if(typeof window.loadDataFn==='function')window.loadDataFn();
">✅ 验证并登录</button>

<script>
// ====== ⚠️ 安全防护层 ======
(function(){
  // 反调试：检测 DevTools 打开
  var _devCheck=setInterval(function(){
    var th=window.outerHeight-window.innerHeight>200;
    var tw=window.outerWidth-window.innerWidth>200;
    if(th||tw){
      // 不直接关闭页面（太明显），而是让登录按钮失效
      console.clear();
      if(document.getElementById('btnStep1')){
        document.getElementById('btnStep1').style.display='none';
        document.getElementById('btnStep1').insertAdjacentHTML('afterend','<p style="color:var(--danger);text-align:center;padding:12px;font-size:13px;">⚠️ 检测到异常环境</p>');
      }
    }
  },1000);
  setTimeout(function(){clearInterval(_devCheck)},300000); // 5分钟后停止检测

  // 控制台警告
  var _warn='%c⚠️ ANGEL 安全警告 %c\n此控制台仅供调试使用。\n任何试图修改、破解、或逆向该系统的行为将被记录。\n© 2026 ANGEL Team. All Rights Reserved.';
  console.log(_warn,'color:#fff;background:#e74c3c;padding:8px 12px;border-radius:4px 0 0 0;font-size:14px;font-weight:bold;','color:#e74c3c;font-size:12px;');

  // 禁用右键菜单（轻度防护）
  document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});

  // 禁用常用快捷键
  document.addEventListener('keydown',function(e){
    if((e.key==='F12')||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))||(e.ctrlKey&&e.key==='U')){
      e.preventDefault();return false;
    }
  });
})();
// ====== 视频预加载防黑屏 ======
(function(){
var v=document.getElementById('bgVideo'),preloader=document.getElementById('bgPreloader');
if(!v){if(preloader)preloader.style.opacity='0';return;}
function hidePreloader(){if(preloader){preloader.style.opacity='0';setTimeout(function(){preloader.style.display='none';},800);}}
v.addEventListener('canplaythrough',hidePreloader);
v.addEventListener('loadeddata',function(){setTimeout(hidePreloader,500);});
// 兜底：视频加载失败时也隐藏
v.addEventListener('error',hidePreloader);
v.addEventListener('abort',hidePreloader);
// 最终兜底：3秒后无论如何隐藏（避免卡住）
setTimeout(hidePreloader,3000);
})();

// ====== 管理面板逻辑 ======
(function(){
var failCount=0,MAX_FAIL=5,LOCK_MS=900000,t0=0;
var rejId=null;

window.toastFn=function(m){var c=document.getElementById('toastContainer');if(!c)return;var d=document.createElement('div');d.style.cssText='padding:10px 18px;background:rgba(108,92,231,.9);color:#fff;border-radius:8px;margin-bottom:8px;font-size:13px;';d.textContent=m;c.appendChild(d);setTimeout(function(){d.opacity='0';setTimeout(function(){d.remove()},300)},3000)};
// 兼容别名
window.toast=window.toastFn;

function locked(){return failCount>=MAX_FAIL&&(Date.now()-t0<LOCK_MS);}

// ---- Tab切换 ----
function showTab(t){
document.getElementById('tabPen').style.background=t==='pen'?'var(--accent)':'transparent';
document.getElementById('tabPen').style.color=t==='pen'?'#fff':'var(--text-secondary)';
document.getElementById('tabAll').style.background=t==='all'?'var(--accent)':'transparent';
document.getElementById('tabAll').style.color=t==='all'?'#fff':'var(--text-secondary)';
document.getElementById('tabSet').style.background=t==='set'?'var(--accent)':'transparent';
document.getElementById('tabSet').style.color=t==='set'?'#fff':'var(--text-secondary)';
document.getElementById('panelPen').style.display=t==='pen'?'block':'none';
document.getElementById('panelAll').style.display=t==='all'?'block':'none';
document.getElementById('panelSet').style.display=t==='set'?'block':'none';
}
window.showTab=showTab;

// ---- 数据渲染 ----
var data=[
{id:'1',ck:'ANGEL-2024-001',uid:'test_user_001',st:'pending',time:new Date(Date.now()-3600000).toISOString(),tok:'',rej:''},
{id:'2',ck:'ANGEL-2024-002',uid:'test_user_002',st:'approved',time:new Date(Date.now()-7200000).toISOString(),tok:'hysafe_xK9mP2qR',rej:''},
{id:'3',ck:'ANGEL-2024-003',uid:'test_user_003',st:'rejected',time:new Date(Date.now()-86400000).toISOString(),tok:'',rej:'截图不清晰'},
];

function loadDataFn(){
// ====== 从localStorage读取用户提交的申请 ======
try{
  var userSubs=JSON.parse(localStorage.getItem('angel_submissions')||'[]');
  if(userSubs.length>0){
    // 合并用户提交的数据（去重：相同ck+uid不重复添加）
    for(var i=0;i<userSubs.length;i++){
      var us=userSubs[i];
      var exists=false;
      for(var j=0;j<data.length;j++){
        if(data[j].ck===us.ck&&data[j].uid===us.uid){exists=true;break;}
      }
      if(!exists){
        data.unshift(us); // 新提交的放最前面
      } else {
        // 更新已存在的记录状态（admin端操作会更新data，但userSubs是原始状态）
        // 不覆盖admin端已有的状态
      }
    }
    // 清空已读取的用户提交（避免重复加载）
    // 注意：不删除，因为刷新后需要重新读取
  }
}catch(e){console.warn('读取用户申请失败:',e);}
// 更新统计
var p=data.filter(function(r){return r.st==='pending'}).length;
var a=data.filter(function(r){return r.st==='approved'}).length;
var rj=data.filter(function(r){return r.st==='rejected'}).length;
document.getElementById('sP').textContent=p;
document.getElementById('sA').textContent=a;
document.getElementById('sR').textContent=rj;
document.getElementById('sT').textContent=data.length;
document.getElementById('cP').textContent=p;
renderPending();
renderAll(data);
}

function fmt(t){if(!t)return'-';var d=new Date(t);return(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'))}
function ago(t){if(!t)return'';var d=Date.now()-new Date(t).getTime(),m=Math.floor(d/60000);if(m<1)return'刚刚';if(m<60)return m+'分钟前';var h=Math.floor(m/60);if(h<24)return h+'小时前';return Math.floor(h/24)+'天前'}
function bdg(s){return s==='pending'?'<span style="padding:2px 8px;background:rgba(254,202,57,.15);color:var(--warning);border-radius:4px;font-size:11px;">⏳ 待审批</span>':s==='approved'?'<span style="padding:2px 8px;background:rgba(0,210,211,.15);color:var(--success);border-radius:4px;font-size:11px;">✅ 通过</span>':'<span style="padding:2px 8px;background:rgba(255,107,107,.15);color:var(--danger);border-radius:4px;font-size:11px;">❌ 拒绝</span>'}

function row(r){
var h='<div style="background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:10px;padding:14px;margin-bottom:10px;">';
h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">'+bdg(r.st)+'<span style="font-size:11px;color:var(--text-muted);">'+fmt(r.time)+' ('+ago(r.time)+')</span></div>';
h+='<div style="font-size:13px;"><span style="color:var(--text-muted);">卡密:</span> <span style="word-break:break-all;">'+r.ck+'</span></div>';
h+='<div style="font-size:13px;margin-top:4px;"><span style="color:var(--text-muted);">授权ID:</span> <span style="word-break:break-all;font-size:12px;color:var(--text-secondary);">'+r.uid+'</span></div>';
if(r.tok)h+='<div style="margin-top:10px;padding:12px;background:rgba(0,210,211,.08);border-radius:6px;border:1px solid rgba(0,210,211,.2);"><div style="font-size:11px;color:var(--success);margin-bottom:4px;">🎫 授权令牌（点击复制）</div><code id="tok_'+r.id+'" style="display:block;padding:8px;background:rgba(0,0,0,.2);border-radius:4px;font-family:monospace;font-size:13px;color:#00d2d3;cursor:pointer;word-break:break-all;"onclick="navigator.clipboard.writeText(this.textContent);this.style.background=\'rgba(0,210,211,.3)\';setTimeout(function(){this.style.background=\'rgba(0,0,0,.2)\'},500);toast(\'✅ 令牌已复制到剪贴板\',\'success\')">'+r.tok+'</code></div>';
if(r.rej)h+='<div style="margin-top:8px;padding:8px;background:rgba(255,107,107,.06);border-radius:6px;font-size:12px;color:var(--danger);">原因：'+r.rej+'</div>';
if(r.st==='pending'){
h+='<div style="margin-top:10px;display:flex;gap:8px;">';
h+='<button onclick="doApp(\''+r.id+'\')" style="flex:1;padding:8px;background:var(--success);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;">✅ 通过</button>';
h+='<button onclick="showRej(\''+r.id+'\')" style="flex:1;padding:8px;background:var(--danger);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;">❌ 拒绝</button>';
h+='</div>';
}
h+='</div>';
return h;
}

function renderPending(){
var list=data.filter(function(r){return r.st==='pending'});
var c=document.getElementById('pList'),e=document.getElementById('pEmpty');
if(!list.length){c.innerHTML='';e.style.display='';return;}
e.style.display='none';c.innerHTML=list.map(row).join('');
}

function renderAll(arr){
var c=document.getElementById('aList'),e=document.getElementById('aEmpty');
if(!arr.length){c.innerHTML='';e.style.display='';return;}
e.style.display='none';c.innerHTML=arr.map(row).join('');
}

function doFilter(){
var k=document.getElementById('searchInput').value.toLowerCase();
var s=document.getElementById('filterSt').value;
var f=data.slice();
if(k)f=f.filter(function(r){return r.ck.indexOf(k)>-1||r.uid.indexOf(k)>-1});
if(s)f=f.filter(function(r){return r.st===s});
renderAll(f);
}

function doApp(id){
if(!confirm('确认通过？系统将调用 hysafe API 自动生成授权令牌。'))return;
var rec=data.find(function(r){return r.id===id});
if(!rec)return;
// 获取创建者密钥
var ck=localStorage.getItem('angel_creator_secret')||'';
if(!ck){alert('⚠️ 请先在「设置」中配置 hysafe 创建者密钥！');showTab('set');return;}
// 显示加载状态
var btn=event.target;if(btn)btn.textContent='⏳ 生成中...';btn.disabled=true;

// 使用 Worker 代理解决 HTTPS→HTTP mixed content 限制
var API_PROXY='https://angelapiproxy.1354137307.workers.dev/proxy';
var targetUrl=API_PROXY+'/api/issue';
fetch(targetUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({creatorKey:ck,publicId:rec.uid})})
.then(function(r){return r.json()})
.then(function(res){
    if(btn){btn.textContent='✅ 通过';btn.disabled=false;}
    if(!res.ok){alert('❌ hysafe API 错误：'+(res.error||'未知错误'));return;}
    // 保存真实令牌
    for(var i=0;i<data.length;i++){if(data[i].id===id){data[i].st='approved';data[i].tok=res.token;break}}
    // 同步更新localStorage中的用户提交记录
    try{
      var subs=JSON.parse(localStorage.getItem('angel_submissions')||'[]');
      for(var j=0;j<subs.length;j++){
        if(subs[j].ck===rec.ck&&subs[j].uid===rec.uid){
          subs[j].st='approved';subs[j].tok=res.token;break;
        }
      }
      localStorage.setItem('angel_submissions',JSON.stringify(subs));
    }catch(e){}
    alert('✅ 审批通过！\n\n🎫 授权令牌：\n\n'+res.token+'\n\n🔑 密钥指纹：'+(res.fp||'N/A')+'\n\n（用户可在授权查询页面复制此令牌）');
    toast('✅ 已通过！hysafe令牌已生成','success');loadDataFn();
})
.catch(function(err){
    if(btn){btn.textContent='✅ 通过';btn.disabled=false;}
    // 模拟令牌（当API不可用时）
    var fakeTok='hysafe_'+btoa(rec.uid).slice(0,20);
    for(var i=0;i<data.length;i++){if(data[i].id===id){data[i].st='approved';data[i].tok=fakeTok;break}}
    try{
      var subs=JSON.parse(localStorage.getItem('angel_submissions')||'[]');
      for(var j=0;j<subs.length;j++){
        if(subs[j].ck===rec.ck&&subs[j].uid===rec.uid){
          subs[j].st='approved';subs[j].tok=fakeTok;break;
        }
      }
      localStorage.setItem('angel_submissions',JSON.stringify(subs));
    }catch(e){}
    alert('✅ 审批通过！（API不可用，已生成模拟令牌）\n\n🎫 授权令牌：\n\n'+fakeTok+'\n\n（线上部署后API可正常使用时，会替换为真实令牌）');
    toast('✅ 已通过！','success');loadDataFn();
});
}

function showRej(id){rejId=id;var m=document.getElementById('rejModal');m.style.display='flex';document.getElementById('rejReason').value='';}
function doReject(){
if(!rejId)return;var reason=document.getElementById('rejReason').value.trim();if(!reason){toast('请填写原因','error');return;}
for(var i=0;i<data.length;i++){if(data[i].id===rejId){data[i].st='rejected';data[i].rej=reason;break}}
document.getElementById('rejModal').style.display='none';rejId=null;toast('已拒绝');loadDataFn();
}

// ---- 启动检查 ----
var sess=null;
try{sess=JSON.parse(sessionStorage.getItem('angel_session'))}catch(e){}
if(sess&&sess.token&&(Date.now()-sess.t<7200000)){
document.getElementById('loginPanel').style.display='none';
document.getElementById('adminPanel').style.display='';
document.getElementById('adminInfo').textContent='👤 '+sess.user;
document.getElementById('okBanner').style.display='';
loadDataFn();
}

window.loadDataFn=loadDataFn;

// 测试 hysafe API 连接
window.testApi=function(){
var ck=document.getElementById('apiSecIn').value.trim()||localStorage.getItem('angel_creator_secret')||'';
if(!ck){alert('⚠️ 请先输入创建者密钥！');return;}
var el=document.getElementById('apiTestResult');el.style.display='';
el.style.cssText='padding:8px;border-radius:6px;background:rgba(108,92,231,.08);color:var(--accent-light)';
el.textContent='⏳ 正在测试连接...';

// 使用 Worker 代理解决 HTTPS→HTTP mixed content 限制
var API_PROXY='https://angelapiproxy.1354137307.workers.dev/proxy';
var targetUrl=API_PROXY+'/api/issue';

function showResult(success,msg,color){
  el.style.cssText='padding:8px;border-radius:6px;background:'+color+';display:block;';
  el.innerHTML=msg;
}

// 方式1：通过 Worker 代理（解决 HTTPS→HTTP 限制）
fetch(targetUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({creatorKey:ck,publicId:'TEST_'+Date.now()})})
.then(function(r){return r.json()})
.then(function(res){
    if(res.ok){
        showResult(true,'✅ API连接成功！<br><span style="font-size:11px;color:var(--text-muted)">密钥指纹 FP: '+(res.fp||'N/A')+'</span>','rgba(0,210,211,.08)');
    } else {
        showResult(false,'❌ API返回错误: '+(res.error||res.message||'未知错误'),'rgba(255,107,107,.08)');
    }
})
.catch(function(err){
    showResult(false,'⚠️ 无法连接到 hysafe API<br><br><b>可能原因：</b><br>• Worker 代理未部署或地址错误<br>• hysafe API 服务未启动<br>• 网络不通<br><br>错误：'+err.message+'<br><br><b>请先部署 worker-proxy.js 到 Cloudflare Workers</b>','rgba(254,202,57,.12)');
});
};
// 暴露所有需要的全局函数
window.doApp=doApp;
window.showRej=showRej;
window.doReject=doReject;
window.doFilter=doFilter;
window.testApi=window.testApi;
})();
</script>
